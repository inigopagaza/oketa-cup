<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>OketaCup — Seleccionar equipos</title></head>
<body>
<h1>Seleccionar equipos</h1>
<p>Presupuesto: {{ budget }}🪙</p>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="{% url 'pool:confirm_selection' %}">
  {% csrf_token %}
  {% for team in teams %}
    <label>
      <input type="checkbox" name="teams" value="{{ team.id }}">
      {{ team.flag_emoji }} {{ team.name }} ({{ team.price }}🪙)
    </label><br>
  {% endfor %}
  <button type="submit">Confirmar selección</button>
</form>
</body>
</html>
