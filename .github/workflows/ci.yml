# GitHub Actions — CI para OketaCup
#
# Se ejecuta en cada push y pull request a main y develop.
# Pasos: lint con ruff → tests con pytest → reporte de cobertura
#
# Los resultados se pueden ver en la pestaña "Actions" del repo de GitHub.

name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint + Tests + Coverage
    runs-on: ubuntu-latest

    services:
      # Base de datos PostgreSQL para los tests
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: oketa_cup_test
          POSTGRES_USER: oketa
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: backend

    steps:
      # 1. Checkout del código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instalar uv (gestor de paquetes Python)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 3. Instalar Python y todas las dependencias (incluye dev)
      - name: Install dependencies
        run: uv sync --all-groups

      # 4. Lint con ruff (comprueba estilo y errores)
      - name: Lint with ruff
        run: uv run ruff check .

      # 5. Verificar formato con ruff
      - name: Check formatting
        run: uv run ruff format --check .

      # 6. Tipado estático con mypy
      - name: Type check with mypy
        run: uv run mypy apps config
        continue-on-error: true  # No bloquea el CI mientras se ajusta el tipado

      # 7. Tests con pytest + cobertura
      - name: Run tests
        env:
          SECRET_KEY: "ci-secret-key-not-for-production"
          DB_NAME: oketa_cup_test
          DB_USER: oketa
          DB_PASSWORD: testpassword
          DB_HOST: localhost
          DB_PORT: "5432"
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: uv run pytest --cov=apps --cov-report=xml --cov-report=term-missing

      # 8. Subir reporte de cobertura (opcional, requiere cuenta en Codecov)
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v4
      #   with:
      #     file: backend/coverage.xml

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
