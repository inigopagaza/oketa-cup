services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oketa_cup}
      POSTGRES_USER: ${POSTGRES_USER:-oketa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    depends_on:
      - db
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-oketa}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-oketa_cup}}
      DB_NAME: ${POSTGRES_DB:-oketa_cup}
      DB_USER: ${POSTGRES_USER:-oketa}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
      FOOTBALL_DATA_BASE_URL: ${FOOTBALL_DATA_BASE_URL:-https://api.football-data.org/v4}
      FOOTBALL_DATA_COMPETITION_CODE: ${FOOTBALL_DATA_COMPETITION_CODE:-WC}
      FOOTBALL_DATA_TIMEOUT_SECONDS: ${FOOTBALL_DATA_TIMEOUT_SECONDS:-20}
      FOOTBALL_DATA_USE_API_STANDINGS: ${FOOTBALL_DATA_USE_API_STANDINGS:-True}
      FOOTBALL_DATA_AUTO_CREATE_KNOCKOUT: ${FOOTBALL_DATA_AUTO_CREATE_KNOCKOUT:-True}
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ../backend/data:/data:ro

  notifier:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    depends_on:
      - db
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-oketa}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-oketa_cup}}
      DB_NAME: ${POSTGRES_DB:-oketa_cup}
      DB_USER: ${POSTGRES_USER:-oketa}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      TZ: ${TZ:-Europe/Madrid}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-true}
      TELEGRAM_DRY_RUN: ${TELEGRAM_DRY_RUN:-false}
      TELEGRAM_START_DATE: ${TELEGRAM_START_DATE:-2026-06-11}
      TELEGRAM_END_DATE: ${TELEGRAM_END_DATE:-2026-07-20}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    command: >
      sh -c "python manage.py run_telegram_notifier"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx

volumes:
  postgres_data:
  static_files:
  media_files:
