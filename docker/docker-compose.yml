# Docker Compose para desarrollo local
# Levanta PostgreSQL y Django con recarga automática de código.
#
# Usa el Makefile de la raíz del proyecto en lugar de invocar este fichero directamente:
#   make up       → levanta en primer plano
#   make up-d     → levanta en background
#   make down     → para los contenedores
#
# Si necesitas ejecutarlo manualmente:
#   docker compose -f docker/docker-compose.yml --env-file backend/.env up

services:

  # ── Base de datos PostgreSQL ───────────────────────────────────────────────
  db:
    container_name: oketa-cup-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-oketa_cup}
      POSTGRES_USER: ${DB_USER:-oketa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Variable DB_PASSWORD requerida}
    volumes:
      # Los datos persisten aunque se pare el contenedor
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Solo expuesto localmente para poder usar herramientas como pgAdmin
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-oketa} -d ${DB_NAME:-oketa_cup}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Django ─────────────────────────────────────────────────────────
  backend:
    container_name: oketa-cup-container
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
      target: builder  # En dev usamos la etapa builder (tiene las herramientas)
    restart: unless-stopped
    command: >
      sh -c "uv sync --frozen &&
             uv run python manage.py migrate &&
             uv run python manage.py runserver 0.0.0.0:8000"
    volumes:
      # Monta el código local para ver cambios sin reconstruir la imagen
      - ../backend:/app
      # Volumen nombrado para el venv: evita que el mount anterior lo sobreescriba
      - backend_venv:/app/.venv
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      DB_NAME: ${DB_NAME:-oketa_cup}
      DB_USER: ${DB_USER:-oketa}
      DB_PASSWORD: ${DB_PASSWORD:?Variable DB_PASSWORD requerida}
      SECRET_KEY: ${SECRET_KEY:?Variable SECRET_KEY requerida}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
      FOOTBALL_DATA_BASE_URL: ${FOOTBALL_DATA_BASE_URL:-https://api.football-data.org/v4}
      FOOTBALL_DATA_COMPETITION_CODE: ${FOOTBALL_DATA_COMPETITION_CODE:-WC}
      FOOTBALL_DATA_TIMEOUT_SECONDS: ${FOOTBALL_DATA_TIMEOUT_SECONDS:-20}
      FOOTBALL_DATA_USE_API_STANDINGS: ${FOOTBALL_DATA_USE_API_STANDINGS:-True}
      FOOTBALL_DATA_AUTO_CREATE_KNOCKOUT: ${FOOTBALL_DATA_AUTO_CREATE_KNOCKOUT:-True}
      TZ: ${TZ:-Europe/Madrid}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-true}
      TELEGRAM_DRY_RUN: ${TELEGRAM_DRY_RUN:-true}
      TELEGRAM_START_DATE: ${TELEGRAM_START_DATE:-2026-06-11}
      TELEGRAM_END_DATE: ${TELEGRAM_END_DATE:-2026-07-20}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── Notifier Telegram ────────────────────────────────────────────────────
  notifier:
    container_name: oketa-cup-notifier
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
      target: builder
    restart: unless-stopped
    command: >
      sh -c "uv sync --frozen &&
             uv run python manage.py run_telegram_notifier"
    volumes:
      - ../backend:/app
      - notifier_venv:/app/.venv
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      DB_NAME: ${DB_NAME:-oketa_cup}
      DB_USER: ${DB_USER:-oketa}
      DB_PASSWORD: ${DB_PASSWORD:?Variable DB_PASSWORD requerida}
      SECRET_KEY: ${SECRET_KEY:?Variable SECRET_KEY requerida}
      TZ: ${TZ:-Europe/Madrid}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-true}
      TELEGRAM_DRY_RUN: ${TELEGRAM_DRY_RUN:-true}
      TELEGRAM_START_DATE: ${TELEGRAM_START_DATE:-2026-06-11}
      TELEGRAM_END_DATE: ${TELEGRAM_END_DATE:-2026-07-20}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  backend_venv:
    driver: local
  notifier_venv:
    driver: local
